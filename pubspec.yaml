publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5
  freezed_annotation: ^2.4.1
  path_provider: ^2.1.4
